name: Automated Data Preprocessing

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: pip install pandas numpy scikit-learn

      - name: Run preprocessing script
        run: python preprocessing/automate_Sebastian-abe-santoso.py

      - name: Commit and push processed data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/wfpfoodpricesidn_preprocessing.csv
          git diff --staged --quiet || git commit -m "Automated preprocessing update"
          git push
